    <section id="contact">
    <h1>Contact Me</h1>
    <p class="contact-subtitle">If you have any academic collaboration, research opportunities, or job openings, please feel free to reach me through filling out the form below!!</p>

    <div class="contact-card"> 
        <form action="https://api.web3forms.com/submit" method="POST" class="contact-form">
            
            <input type="hidden" name="access_key" value="28a31eff-dea9-4619-b759-fa990d24b513">

            <div class="form-group">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" required placeholder="Your Name">
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required placeholder="Your Email Address">
            </div>

            <div class="form-group">
                <label for="message">Message</label>
                <textarea id="message" name="message" rows="5" required placeholder="Type your message here..."></textarea>
            </div>

            <button type="submit" class="submit-btn">Send Message</button>
        </form>


    </div>
